<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
</head>

<body>

<div class="container bg-blue-300 min-h-screen flex flex-col items-center justify-center gap-5 w-1080px mx-auto">
<div class="inner-container w-full max-w-md bg-blue-900 p-5 rounded-lg shadow-lg text-white">
<h1 class="text-center text-xl font-bold">PASSWORD GENERATOR</h1>

<div class="display border-2 border-red-300 shadow-lg rounded-lg p-3 my-3 flex items-center justify-between gap-2">
<input readonly placeholder="password" class="display-password" data-passworddisplay>

<button class="copybtn">
<span copymsg></span>
<img src="th.webp" alt="copy" width="30" height="30">
</button>
</div>


<div class="input-container">

<div class="flex flex-row justify-between">
<p class="font-bold">Password Length</p>
<p data-lengthnumber>0</p>
</div>

<div >
<input class="w-full" type="range" min="1" max="20" class="slider" step="1" data-passwordlength>
</div>


<div class="checkbox">

<label class="font-bold">
<input type="checkbox" class="upper">
Include Uppercase Letters
</label>
<br>

<label class="font-bold">
<input type="checkbox" class="lower">
Include Lowercase Letters
</label>
<br>

<label class="font-bold">
<input type="checkbox" class="number">
Include Numbers
</label>
<br>

<label class="font-bold">
<input type="checkbox" class="symbol">
Include Symbols
</label>

</div>


<div class="strength flex flex-row justify-between items-center">
<p class="font-bold">Strength</p>
<div data-indicator class="w-5 h-5 bg-white rounded-full"> </div>
</div>

<div class="text-xl text-center font-bold border-4 p-3 rounded-lg border-red-300 shadow-lg my-3">
<button data-generatepassword>Generate Password</button>
</div>
</div>

</div>
</div>

<script type="module" src="/src/script.js"></script>

</body>
</html>
